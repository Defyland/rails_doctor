name: RailsDoctor Deploy Gate

"on":
  pull_request:
  push:

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: mkdir -p tmp
      - run: bin/rails doctor --environment=production --fail-on warning --format=github-actions
      - run: bin/rails doctor --environment=production --report=suppressions --format=json > tmp/rails_doctor_suppressions.json
      - uses: actions/upload-artifact@v4
        with:
          name: rails-doctor-suppressions
          path: tmp/rails_doctor_suppressions.json
